version: '3.8'
services:
  frontend:
    build:
      context: ./client  # Path to the Next.js frontend code
      dockerfile: Dockerfile
    ports:
      - '3000:3000'  # Map the container port to the host port

  backend:
    build:
      context: ./server_v2  # Path to the FastAPI backend code
      dockerfile: Dockerfile
    ports:
      - '5001:8000'  # Map the container port to the host port
    depends_on:
      - frontend  # Ensure that the frontend service is running before starting the backend service
